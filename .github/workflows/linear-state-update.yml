name: Update Linear on PR Merge

# Updates Linear issue state automatically when a PR merges to main.
# Requires: LINEAR_API_KEY secret, LINEAR_DONE_STATE_ID variable.
#
# The branch name OR PR title must contain a Linear issue ID like AA-12 or LIN-456.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  update-linear:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Extract Linear Issue ID
        id: linear-id
        run: |
          BRANCH="${{ github.head_ref }}"
          TITLE="${{ github.event.pull_request.title }}"
          LINEAR_ID=$(echo "$BRANCH $TITLE" | grep -oE '[A-Z]+-[0-9]+' | head -1)
          if [ -z "$LINEAR_ID" ]; then
            echo "No Linear issue ID found in branch '$BRANCH' or title '$TITLE'. Skipping."
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "Found Linear ID: $LINEAR_ID"
            echo "linear_id=$LINEAR_ID" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Update Linear issue to Done
        if: steps.linear-id.outputs.found == 'true'
        run: |
          LINEAR_ID="${{ steps.linear-id.outputs.linear_id }}"
          DONE_STATE="${{ vars.LINEAR_DONE_STATE_ID }}"

          RESPONSE=$(curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: ${{ secrets.LINEAR_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"query { issue(id: \\\"$LINEAR_ID\\\") { id title } }\"}")

          ISSUE_ID=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('data',{}).get('issue',{}).get('id',''))" 2>/dev/null)

          if [ -z "$ISSUE_ID" ]; then
            echo "Could not resolve Linear issue for $LINEAR_ID"
            exit 0
          fi

          UPDATE=$(curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: ${{ secrets.LINEAR_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { issueUpdate(id: \\\"$ISSUE_ID\\\", input: { stateId: \\\"$DONE_STATE\\\" }) { success issue { title state { name } } } }\"}")

          echo "Linear update: $UPDATE"
          echo "✅ Linear $LINEAR_ID marked Done"

      - name: Add PR merge comment
        if: steps.linear-id.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `✅ Proof merged. Linear issue ${{ steps.linear-id.outputs.linear_id }} marked Done.`
              });
            } catch (e) {
              console.log('Could not post comment (permissions):', e.message);
            }
