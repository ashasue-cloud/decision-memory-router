name: Proof Validation

# Validates proof artifacts on every PR. Fails if no proof exists at all.
# Install in any Ashley proof repo.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-proof:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            npm install
          fi

      - name: Check proof infrastructure exists
        run: |
          HAS_PROOFS=false
          HAS_SCRIPTS=false
          HAS_README=false

          [ -d "proofs" ] && [ "$(ls -A proofs/ 2>/dev/null)" ] && HAS_PROOFS=true
          ls scripts/test-*.mjs 2>/dev/null | head -1 | grep -q "." && HAS_SCRIPTS=true
          grep -qi "proof\|evidence\|result\|eval" README.md 2>/dev/null && HAS_README=true

          echo "proofs/: $HAS_PROOFS"
          echo "scripts/test-*.mjs: $HAS_SCRIPTS"
          echo "README proof section: $HAS_README"

          if [ "$HAS_PROOFS" = "false" ] && [ "$HAS_SCRIPTS" = "false" ] && [ "$HAS_README" = "false" ]; then
            echo "::error::No proof artifacts found. Add proofs/, scripts/test-*.mjs, or a README proof section before merging."
            exit 1
          fi

      - name: Run proof scripts
        run: |
          FAILED=0
          if ls scripts/test-*.mjs 2>/dev/null | head -1 | grep -q "."; then
            for script in scripts/test-*.mjs; do
              echo "Running: $script"
              node "$script" || { echo "::error::Failed: $script"; FAILED=1; }
            done
          fi
          if [ -f "scripts/content-gate.mjs" ]; then
            node scripts/content-gate.mjs || { echo "::error::Content gate failed"; FAILED=1; }
          fi
          [ $FAILED -eq 1 ] && exit 1
          echo "✅ All proof scripts passed"
