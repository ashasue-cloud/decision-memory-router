name: Proof Validation

# Runs on every PR to main. Checks that proof artifacts exist and scripts pass.
# Install in any Ashley proof repo. Does not require Linear or API keys.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-proof:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            npm install
          fi

      - name: Check proof directory exists
        run: |
          if [ ! -d "proofs" ]; then
            echo "::warning::No proofs/ directory found. Add proof artifacts before claiming build is done."
          else
            echo "✅ proofs/ directory found"
            ls proofs/
          fi

      - name: Run all test scripts
        run: |
          FAILED=0
          if [ -d "scripts" ]; then
            for script in scripts/test-*.mjs; do
              if [ -f "$script" ]; then
                echo "Running: $script"
                node "$script" || { echo "❌ FAILED: $script"; FAILED=1; }
              fi
            done
          fi
          if [ -f "scripts/content-gate.mjs" ]; then
            echo "Running content gate..."
            node scripts/content-gate.mjs || { echo "❌ Content gate failed"; FAILED=1; }
          fi
          if [ $FAILED -eq 1 ]; then
            echo "::error::One or more proof scripts failed. Build state cannot advance."
            exit 1
          fi
          echo "✅ All proof scripts passed"

      - name: Verify README proof claims
        run: |
          if [ -f "README.md" ]; then
            # Warn if README has no proof section
            if ! grep -qi "proof\|evidence\|result" README.md; then
              echo "::warning::README has no proof/evidence section. Consider adding proof of use."
            else
              echo "✅ README contains proof section"
            fi
          fi
